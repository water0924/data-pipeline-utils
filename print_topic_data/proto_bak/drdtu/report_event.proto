// 失败或暂停原因
message FailOrSuspendReason {
  // 一级失败或暂停原因枚举
  enum MainFailOrSuspendReason {
    // ===== 故障失效类 (0-19) =====
    FAIL_OR_SUSPEND_REASON_UNKNOWN = 0;
    MAIN_CONTROL_UNIT_FAILURE = 1;     // 主控单元异常
    ASSOCIATED_SYSTEM_FAILURE = 2;     // 关联系统异常
    CAMERA_FAILURE = 3;                // 摄像头异常
    OTHER_INHIBITION_CONDITION = 4;   // 其他抑制条件
    LIDAR_FAILURE = 5;                 // 激光雷达异常
    ULTRASONIC_FAILURE = 6;            // 超声波雷达异常
    BLUETOOTH_CONNECTION_FAILURE = 7;  // 蓝牙连接异常
    PARKING_BRAKE_FAILURE = 8;         // 驻车故障
    // 9-19 预留

    // ===== 超出系统边界类 (20-79) =====
    PARKING_ROUNDS_LIMIT = 20;         // 泊车揉库次数超限
    OPERATION_TIMEOUT = 21;            // 时间超时
    SPEED_LIMIT_D_GEAR = 22;           // 车速超限(D档)
    SPEED_LIMIT_R_GEAR = 23;           // 车速超限(R档)
    SLOPE_LIMIT_EXCEEDED = 24;         // 坡度超限
    SAFETY_SYSTEM_ACTIVATED = 25;      // 主被动安全功能激活
    POWER_MODE_NOT_READY = 26;         // 动力模式未ready
    DRIVING_MODE_UNSUPPORTED = 27;     // 驾驶模式不满足
    CAMERA_DIRTY = 28;                 // 摄像头脏污
    CAMERA_OCCLUDED = 29;              // 摄像头遮挡
    LIDAR_OCCLUDED = 30;               // 激光雷达遮挡
    PARK_IN_FAILURE = 31;              // 系统无法泊入车位
    PARK_OUT_FAILURE = 32;             // 系统无法泊出
    NARROW_PARKING_SPACE = 33;         // 车位空间狭窄受限
    EXCESSIVE_DISTANCE = 34;           // 距离过长
    HANDBRAKE_REQUIRED = 35;           // 请拉起手刹挂至P挡
    ROUTE_DUPLICATION = 36;            // 路线重复
    ENVIRONMENT_TOO_OPEN = 37;         // 环境过于空旷
    TRAJECTORY_CALCULATION_FAILED = 38; // 轨迹计算不成功
    HOOD_OPEN = 39;                    // 前机舱打开
    TRUNK_OPEN = 40;                   // 后备箱打开
    DOOR_OPEN = 41;                    // 车门打开
    MIRROR_FOLDED = 42;                // 外后视镜折叠
    SEATBELT_UNFASTENED = 43;          // 主驾驶安全带解开
    PEDESTRIAN_INTRUSION = 44;         // 行人入侵
    VEHICLE_INTRUSION = 45;            // 车辆入侵
    STATIC_OBSTACLE_BLOCKING = 46;      // 遇到无法绕行的静态障碍物
    TARGET_SLOT_OCCUPIED = 47;         // 目标车位被占
    ILLUMINATION_CONDITION = 48;       // 光照条件ODD不满足
    RAIN_CONDITION = 49;               // 雨量条件ODD不满足
    GATE_PASS_FAILURE = 50;            // 无法通过闸机
    ROUTE_MATCH_TIMEOUT = 51;          // 路线匹配超时
    ACTIVATION_FAILURE = 52;           // 激活失败导致
    SENSOR_UNCALIBRATED = 53;          // 传感器未标定
    OTHER_ADAS_ACTIVATED = 54;         // 其他辅助驾驶功能激活
    PARK_OUT_DIRECTION_LOST = 55;      // 泊出方向消失
    REVERSE_DISTANCE_LIMIT = 56;       // 倒车距离超限
    POSITIONING_FAILURE = 57;          // 定位不成功
    E2E_SWITCH_FAILURE = 58;           // E2E切换失败
    // 59-79 预留

    // ===== 用户干预类 (80-89) =====
    USER_MANUAL_EXIT = 80;             // 驾驶员主动退出
    GEAR_INTERVENTION = 81;            // 驾驶员干预（挡位）
    STEERING_INTERVENTION = 82;        // 驾驶员干预（方向盘）
    HANDBRAKE_INTERVENTION = 83;       // 驾驶员干预（手刹）
    BRAKE_INTERVENTION = 84;           // 驾驶员干预（刹车）
    ACCELERATOR_INTERVENTION = 85;     // 驾驶员干预（油门）
    APP_SUSPENSION = 86;               // 驾驶员手机APP暂停
    // 87-89 预留

    // ===== 建图路线异常 (100-104) =====
    VEHICLE_NOT_IN_SLOT = 100;         // 车辆未在车位中
    HEAD_IN_PARKING = 101;             // 车头泊入
    ROUTE_QUALITY_INSUFFICIENT = 102;  // 路线质量不满足
    INSUFFICIENT_STORAGE = 103;        // 存储空间不足
    MAPPING_DISTANCE_TOO_SHORT = 104;  // 建图距离过短
  }
  
  MainFailOrSuspendReason main_fail_or_suspend_reason = 1;  // 一级失败或暂停原因, 包含pause_reason 暂停原因
  string pause_time = 2;   // 暂停时刻, TODO: 待确认
  string restore_time = 3; // 暂停恢复耗时，泊车功能暂停到恢复的时间
  string resume_time = 4;  // 重新恢复泊车耗时, 泊车功能恢复到用户确认恢复按钮这两段
  int32 second_fail_or_suspend_reason = 5;         // 二级失败或暂停原因（预留，填0）
  repeated int32 safety_events = 6;         // 具体safety事件
}

