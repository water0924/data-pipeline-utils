}

// 障碍物信息
message SubObjInfo {
  enum PosDir {
    POS_DIR_UNKNOWN = 0;
    POS_DIR_FRONT = 1;
    POS_DIR_BACK = 2;
    POS_DIR_LEFT = 3;
    POS_DIR_RIGHT = 4;
  }
  int32 id = 1;           // 障碍物ID（根据感知障碍物ID赋值）
  ObjType type = 2;         // 障碍物类型
  float x = 3;            // 障碍物中心点x坐标（单位：m，精度0.01m）相对坐标系
  float y = 4;            // 障碍物中心点y坐标（单位：m，精度0.01m）
  float yaw = 5;          // 障碍物航向角（单位：°，精度0.01°）
  float speed = 6;        // 障碍物速度（单位：m/s，精度0.1m/s）
  bool is_moving = 7;     // 障碍物是否移动
  PosDir pos_dir = 8;     // 障碍物相对于自车的位置方向
  float distance = 9;    // RSPA 最近距离
}

message ObjInfo {
  repeated SubObjInfo obj_infos = 1;
}

