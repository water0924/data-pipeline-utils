message SlotInfo {
  enum ParkingDir {
    PARKINGDIR_UNKNOWN = 0;
    REAR_IN = 1;          // 车尾泊入
    FRONT_IN = 2;         // 车头泊入
    FRONT_OUT = 11;       // 正前泊出
    LEFT_FRONT_OUT = 12;  // 左前泊出
    RIGHT_FRONT_OUT = 13; // 右前泊出
    REAR_OUT = 14;        // 正后泊出
    LEFT_REAR_OUT = 15;   // 左后泊出
    RIGHT_REAR_OUT = 16;  // 右后泊出
    FORWARD = 21;         // 前进（直线召唤）
    BACKWARD = 22;        // 后退（直线召唤）
  }

  enum ParkingPos {
    PARKINGPOS_UNKNOWN = 0;
    LEFT = 1;     // 靠左
    CENTER = 2;   // 居中
    RIGHT = 3;    // 靠右
  }

  enum SlotTypeDir {
    SLOTTYPEDIR_UNKNOWN = 0;
    VERTICAL = 1;     // 垂直车位
    PARALLEL = 2;   // 水平车位
    SLANTED = 3;      // 斜列车位
  }

  enum SlotTypeLine {
    SLOTTYPELINE_UNKNOWN = 0;
    SPACE = 1;        // 空间车位
    MARKED = 2;       // 划线车位
    MECHANICAL = 3;   // 机械车位
    CUSTOM = 4;       // 自选车位
  }

  enum SlotTypeObj {
    SLOTTYPEOBJ_UNKNOWN = 0;
    BOTH_OPEN = 1;    // 双边空旷车位
    SINGLE_OPEN = 2;  // 单边空旷车位
    BOTH_OBSTACLE = 3; // 双边障碍车位
    DEAD_END = 4;     // 断头车位
  }

  enum SlotTypeSpace {
    SLOTTYPESPACE_UNKNOWN = 0;
    STANDARD = 1;       // 标准车位
    NARROW = 2;         // 狭窄车位
    EXTREME_NARROW = 3; // 极小车位
  }

  enum NoParkReason {
    INITIAL_VALUE = 0;
    THE_ENVIRONMENT_IS_DARK = 1;
    SLOT_NARROW = 2;
    PASSAGE_NARROW = 3;
    FAR_FROM_THE_SLOT = 4;
    GROUND_LOCK_IS_OPENED = 5;
    SLOT_IS_OCCUPIED = 6;
    WHEELSTOPPER_INVADE = 7;
    TRUCK_INVADE = 8;
    VEHICLE_INVADE = 9;
    CONE_BARREL_INVADE = 10;
    PEDESTRIAN_INVADE = 11;
    PILLAR_INVADE = 12;
    BUSHES_INVADE = 13;
    TREE_INVADE = 14;
