  TRICYCLE = 7;  // 三轮车
  ADULT = 11;  // 成人
  CHILD = 12;  // 儿童
  PILLAR = 16;  // 柱子
  WALL = 17;  // 墙
  CONE = 21;  // 锥桶
  WATER_BARRIER = 22;  // 水马
  CURB = 23;  // 路沿
  RESERVED = 26;  // 预留
