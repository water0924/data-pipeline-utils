// E2E切换数据
message E2ESwitch {
  enum SwitchType {
    SWITCH_TYPE_NONE = 0;              // 无
    NOA_TO_HAVP = 1;      // noa2havp
    HAVP_TO_NOA = 2;      // havp2noa
  }
  enum NoaToHpaSwitchFailedReason {
    NOA_TO_HPA_REASON_UNKNOWN = 0;
    NOT_MATCHED_END_MAP = 1;  // 未定位到泊入路线
    NO_OVERLAP_WITH_HPA = 2;  // 没有NCA重叠
    NOA_DOWNGRADING_TOO_EARLY = 3;  // NOA降级过早
    SPEED_OVER_HPA_ODD = 4;  // 速度超过HPA ODD
    HPA_PASSIVE = 5;  // HPA被抑制
    USER_DOWNDEGRADE_NOA = 6;  // 用户主动降级NOA
    OTHER_NOA_TO_HPA_SWITCH_FAILED = 7;  // 其他失败原因
    LATERAL_DIST_TO_PATH_TOO_LARGE = 8;  // 横向距离到泊入路线过大
    E2E_IN_AND_OUT_IN_SAME_PARKING = 9;  // E2E入库和泊出在同一个停车场范围内切换
  }
  enum HpaToNoaSwitchFailedReason {
    HPA_TO_NOA_REASON_UNKNOWN = 0;
    NOA_PASSIVE_SWITCH_TO_LCC = 1;  // NOA被抑制只切换到LCC
    NOA_LCC_PASSIVE = 2;  // NOA/LCC都被抑制
    HPA_EXIT_TOO_EARLY = 3;  // 提前退出HPA
    PARKING_ODD_EXIT_CHECK_FAILED = 4;  // 驶出停车场ODD判断异常
    NAVI_ABNORMAL = 5;  // 导航异常
    OTHER_HPA_TO_NOA_SWITCH_FAILED = 6;  // 其他失败原因
  }
  SwitchType switch_type = 1;      // 切换类型
  float switch_location = 2;       // 切换位置（单位：米）
  float speed_difference = 3;      // 切换前后的速度变化（单位：m/s）
  NoaToHpaSwitchFailedReason noa_to_hpa_switch_failed_reason = 4;  // NOA到HPA切换失败原因
  HpaToNoaSwitchFailedReason hpa_to_noa_switch_failed_reason = 5;  // HPA到NOA切换失败原因
}

message D2DNaviMatchInfo {
