// 泊车通用信息
message ParkingCommon {
  enum Func {
    FUNC_UNKNOWN = 0;
    APA_RPA = 1;     // APA/RPA
    RADS = 2;        // RADS
    HAVP = 3;        // HAVP
    AVM = 4;         // AVM
    MEB = 5;         // MEB
    E2E_HAVP = 6;    // E2E HAVP
    E2E_NOA = 7;    // E2E NOA
    RSPA = 8;        // RSPA
  }

  enum SubFunc {
    SUBFUNC_UNKNOWN = 0;
    APA_IN = 1;       // 智能泊入
    APA_OUT = 2;      // 智能泊出
    RPA_IN = 3;      // 遥控泊入
    RPA_OUT = 4;     // 遥控泊出
    STRAIGHT_IN_OUT = 5;       // 直线召唤

    // RADS子功能
    REVERSE_TRACKING = 11;   // 倒车循迹

    // HAVP子功能
    PARK_IN_MAPPING = 21;    // 泊入建图
    PARK_OUT_MAPPING = 22;   // 泊出建图
    PARK_IN_CRUISE = 23;     // 泊入巡航
    PARK_OUT_CRUISE = 24;    // 泊出巡航
    PARK_IN_NAVI = 25;       // 泊入导航
    PARK_OUT_NAVI = 26;      // 泊出导航
  }

  enum CtrlState {
    State_Default = 0;
    State_NotAuto = 1;
    State_LonAuto = 2;
    State_InAuto = 3;
  }

  Func func = 1;                  // 泊车功能
