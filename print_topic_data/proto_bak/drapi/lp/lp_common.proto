syntax = "proto3";

package lp.common;

enum AdasStatusEnum {
  STATUS_NONE		= 0;  //默认值
  UNAVAILABLE_ALL   = 1;  //LCC/CNAP/HPA不可用
  AVAILABLE_LCC     = 2;  //仅LCC可用
  AVAILABLE_CNAP    = 3;  //CNAP或HPA可用
  START_LCC         = 4;  //仅LCC激活
  START_CNAP        = 5;  //CNAP或HPA激活
  PAUSE_LCC         = 6;  //LCC暂停
  PAUSE_CNAP        = 7;  //CNAP或HPA暂停
