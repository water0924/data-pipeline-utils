} //文档配图说明

enum AccStatusEnum {
  STATUS_NONE_ACC	= 0;  //默认值
  UNAVAILABLE_ACC   = 1;  //ACC不可用
  AVAILABLE_ACC     = 2;  //ACC可用
  START_ACC         = 3;  //ACC激活
} 

enum ParkingRequestEnum {
  PARKING_REQUEST_NONE                = 0;  //默认值
  PARKING_REQUEST_INITIALIZE          = 1;  //当前预留
  PARKING_REQUEST_START               = 2;	// 开始
  PARKING_REQUEST_PAUSE               = 3;  //当前预留
  PARKING_REQUEST_CONTINUE            = 4;	// 继续
  PARKING_REQUEST_ABORT               = 5;	// 取消
  PARKING_REQUEST_OFF                 = 6;  //当前预留
  PARKING_REQUEST_COMPLETE            = 7;	// 完成
  PARKING_REQUEST_START_PARKING_IN    = 8;  //当前预留
  PARKING_REQUEST_START_PARKING_OUT   = 9;  //当前预留
