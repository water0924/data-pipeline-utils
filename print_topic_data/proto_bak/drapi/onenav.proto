  ASSI_ACTION_LEFT_BRANCH_4 = 72;  // 到达复杂路口，走左边第四出口
  ASSI_ACTION_LEFT_BRANCH_5 = 73;  // 到达复杂路口，走左边第五出口
  ASSI_ACTION_ENTER_ULINE = 80;    // 进入调头专用路
  ASSI_ACTION_PASS_CROSSWalk = 90;           // 通过人行横道
