syntax = "proto2";
package dr.common.navigation;

// version 0.1.2
// 0.1.2说明： 去除绿波车速、合并引导和车道信息、去除IconType
// 0.1.3说明： 
//   1. GuidanceInfo增加distance_to_action字段，到转向动作的距离
//   2. TrafficEventInfo增加distance字段，到拥堵点的距离，0表示在拥堵区间
//   3. GlobalRoute增加p2p_mapId字段，P2P自建图id，没有就发0
//   4. GlobalRoute中的Link点链由GpsPoint3D改为Point2D
// 导航信号 - 接口协议
// ============================================================================
// 实时导航信息 NavigationRealTimeData
// ============================================================================

// Topic: /drapi/navigation_info 期望是事件型,下列的每一个二级message数据在发生更改时发送即可,不期望在每个消息中全量发送所有二级message数据
message NavigationRealTimeData {
  optional NavigationStatusInfo navigation_status_info = 1; // 导航状态
  optional ElectronicEyeInfo electronic_eye_info = 2; // 电子眼信息
  optional GuidanceInfo guidance_info = 3; // 引导信息
  optional TrafficStatusInfo traffic_status_info = 4; // 交通拥堵状况
  optional TrafficLightInfo traffic_light_info = 5; // 红绿灯信息
  optional CurrentRoadInfo current_road_info = 6; // 当前道路信息
  optional TrafficEventInfo traffic_event_info = 7; // 交通事件信息
}

// ----------------------------------------------------------------------------
// 1. 导航状态信息
// ----------------------------------------------------------------------------

// 实时导航状态 期望至少1hz发送
message NavigationStatusInfo {
  optional uint64 path_id = 1; // 导航路径ID
  optional NavigationStatus status = 2; // 导航状态
}

enum NavigationStatus {
  STATUS_NONE = 0;        // 未导航
  STATUS_GPS = 1;         // GPS导航
  STATUS_SIMULATION = 2;  // 模拟导航
  STATUS_REPLANNING = 3;  // 重新规划
  STATUS_CRUISING = 4;    // 巡航
  STATUS_DEVIATED = 5;    // 偏航
  STATUS_PLANNING = 6;    // 规划中，还未点确认开始导航
  STATUS_ENDED = 7;       // 导航结束
}

// ----------------------------------------------------------------------------
// 2. 电子眼信息
// ----------------------------------------------------------------------------

message ElectronicEyeInfo {
  repeated CameraInfo camera_infos = 1; // 摄像头信息
}

// 摄像头信息(电子眼)
message CameraInfo {
  optional uint32 camera_id = 1; // 电子眼ID
  optional int32 speed_limit = 2; // 电子眼限速
  optional double distance = 3; // 电子眼距离
  optional GpsPoint3D gps_point = 4; // 电子眼坐标3D
}

// ----------------------------------------------------------------------------
// 3. 引导信息
// ----------------------------------------------------------------------------

// 车道动作
message LaneActionsInfo {
  optional double distance_to_lane_actions = 1;  // 到前背景车道的距离
  repeated LaneAction foreground_lanes = 2;      // 前景车道
  repeated LaneAction background_lanes = 3;      // 背景车道
  repeated LaneAction recommended_lanes = 4;     // 推荐车道
}

// 引导信息
message GuidanceInfo {
  optional MainAction main_action = 1;            // 主动作
  optional AssistantAction assistant_action = 2;  // 辅助动作
  optional LaneActionsInfo lane_action = 3;       // 车道动作
  optional double distance_to_action = 4;         // 到转向动作的距离
}

// ----------------------------------------------------------------------------
// 4. 交通拥堵状况
// ----------------------------------------------------------------------------

message TrafficStatusInfo {
  enum TrafficStatus {
    TRAFFIC_STATUS_NULL = 0;            // 无效值
    TRAFFIC_STATUS_OPEN = 1;            // 畅通
    TRAFFIC_STATUS_SLOW = 2;            // 缓行
    TRAFFIC_STATUS_JAM = 3;             // 拥堵
    TRAFFIC_STATUS_CONGESTED = 4;       // 严重拥堵
    TRAFFIC_STATUS_EXTREMELY_OPEN = 5;  // 极度畅通
  }
  optional TrafficStatus traffic_status = 1; // 交通拥堵状况
  optional double distance = 2;              // 到拥堵点的距离，0表示在拥堵区间
}

// ----------------------------------------------------------------------------
// 5. 红绿灯信息
// ----------------------------------------------------------------------------

// 红绿灯信息
message TrafficLightInfo {
  optional double distance = 1;              // 到达红绿灯的距离
  optional int32 wait_num = 2;              // 等红绿灯轮数
  repeated LightState states = 3;  // 实时状态和倒计时
  optional GpsPoint3D gps_point = 4;        // 红绿灯位置坐标
}

// 红绿灯状态
message LightState {
  optional LightStateType type = 1;  // 红绿灯状态类型
  optional TrafficLightDir dir = 2;         // 红绿灯控制方向
  optional int32 count_down = 3;    // 倒计时，单位秒 常亮灯为最大值
}

// 红绿灯状态类型
enum LightStateType {
  LIGHT_STATE_TYPE_NULL = 0;           // 无效值
  LIGHT_STATE_TYPE_RED = 1;            // 红灯倒计时
  LIGHT_STATE_TYPE_GREEN = 2;          // 绿灯可通行
  LIGHT_STATE_TYPE_SOON_TURN_RED = 3;  // 即将变红灯
}

enum TrafficLightDir {
  TRAFFIC_LIGHT_DIR_NULL = 0;   // 无效值
  TRAFFIC_LIGHT_DIR_AHEAD = 1;  // 直行
  TRAFFIC_LIGHT_DIR_LEFT = 2;   // 左转
  TRAFFIC_LIGHT_DIR_RIGHT = 3;  // 右转
  TRAFFIC_LIGHT_DIR_UTURN = 4;  // 掉头
}

// ----------------------------------------------------------------------------
// 6. 当前道路信息
// ----------------------------------------------------------------------------

// 当前道路信息
message CurrentRoadInfo {
  optional uint64 ad_code = 1;  // 区域编码,由6位数字组成,唯一标识一个区划,
  optional int32 curr_link_id = 2;         // 当前小路段Link Id
  optional int32 curr_step_id = 3;         // 当前导航段Step Id
  optional int32 curr_speed_limit = 4;     // 当前道路限速[km/h], 巡航也需要
  optional RoadClass curr_road_class = 5;  // 当前道路等级, 巡航也需要
  optional RoadType curr_road_type = 6;   // 当前道路类型, 巡航也需要
  optional LinkType curr_link_type = 7;   // 当前Link类型, 巡航也需要
  optional string curr_road_name = 8;     // 当前道路名称, 巡航也需要
  optional int32 curr_lane_num = 9;  // 当前车道数量,行驶方向的车道数量, 巡航也需要
  optional int32 curr_is_two_way_road = 10;  // 当前是否是双向通行道路, 0无效值，1是，2否，巡航也需要
  optional int32 distance_to_next_link = 11;  // 到下个Link的距离[m]
  optional int32 distance_to_next_step = 12;  // 到下个Step的距离[m]
  optional int32 path_retain_distance = 13;   // 路线剩余距离[m]
  optional int32 path_retain_time = 14;       // 路线剩余时间[s]
  optional GpsPoint3D curr_position = 15;     // 当前位置Gps, 巡航也需要
  optional string navigation_voice_command = 16;  // 导航语音指令，根据实际获取数据发送即可
}

// ----------------------------------------------------------------------------
// 7. 交通事件信息
// ----------------------------------------------------------------------------
message TrafficEventInfo {
  optional int32 is_valid = 1;  // 0:该信息无效，1：该信息有效
  optional int32 distance = 2;  // 到达事件的距离，处于事件范围中时持续填0
  optional TrafficEventType event_types = 3;    // 事件类型
  optional OccupiedLaneType occupied_lane = 4;  // 占用车道类型，占哪边车道
  optional GpsPoint3D gps_point = 5;            // 位置坐标
}

// 交通事件类型
enum TrafficEventType {
  TRAFFIC_EVENT_TYPE_NULL = 0;                       // 无效值
  TRAFFIC_EVENT_TYPE_FLOW = 1;                       // 流量
  TRAFFIC_EVENT_TYPE_ACCIDENT = 2;                   // 事故
  TRAFFIC_EVENT_TYPE_CONSTRUCTION = 3;               // 施工
  TRAFFIC_EVENT_TYPE_CONTROL = 4;                    // 管制
  TRAFFIC_EVENT_TYPE_WEATHER = 5;                    // 天气
  TRAFFIC_EVENT_TYPE_ROAD = 6;                       // 路面
  TRAFFIC_EVENT_TYPE_ACTIVITY = 7;                   // 活动
  TRAFFIC_EVENT_TYPE_DISASTER = 8;                   // 活动
  TRAFFIC_EVENT_TYPE_OHTER = 9;                      // 其他
  TRAFFIC_EVENT_TYPE_ACCIDENT_AND_CONTROL = 10;      // 事故&管制
  TRAFFIC_EVENT_TYPE_CONSTRUCTION_AND_CONTROL = 11;  // 施工&管制
  TRAFFIC_EVENT_TYPE_WEATHER_AND_CONTROL = 12;       // 天气&管制
  TRAFFIC_EVENT_TYPE_ROAD_AND_CONTROL = 13;          // 路面&管制
}

// 占用车道类型
enum OccupiedLaneType {
  OCCUPIED_LANE_TYPE_NULL = 0;        // 无效值
  OCCUPIED_LANE_TYPE_LEFT_SIDE = 1;   // 占用左侧车道
  OCCUPIED_LANE_TYPE_RIGHT_SIDE = 2;  // 占用右侧车道
  OCCUPIED_LANE_TYPE_BOTH_SIDE = 3;   // 占用两侧车道
  OCCUPIED_LANE_TYPE_MIDDLE = 4;      // 占用中间车道
  OCCUPIED_LANE_TYPE_ALL = 5;         // 占用全部车道
}

// ============================================================================
// 导航全局路径信息 MapRoute
// ============================================================================
// Topic: /drapi/ivi_info
message MapRoute {
  optional int32 id = 1;
  repeated GlobalRoute global_route = 2;
}

message GlobalRoute {
  optional uint64 proto_id = 1;  // 按本协议发送时请填70030300, 用于区分proto协议
  optional uint64 path_id = 2;      // 导航路径Id
  optional int32 all_length = 3;    // 导航全程长度[m], v3.3 add
  optional int32 step_num_all = 4;  // 当前路径导航段总数
  optional int32 step_num_sended = 5;  // 已经发送导航段数量(含本次)，重叠step不重复计算
  optional int32 redundant_count = 6;  // 完全相同内容冗余发送次数，第一次发送时填0，后续+1
  repeated Step steps = 7;  // 路径包含的导航段，如果是一次性发送则是该路径全部导航段
  repeated int32 reserves_int = 8;      // 全局路径预留变量,整数
  repeated double reserves_double = 9;  // 实时信息预留变量,浮点数
  optional uint64 check_code = 10;  // 按本协议发送时请填1234, 用于校验proto内容
  optional uint32 p2p_mapId = 11; //新增，P2P自建图id，没有就发0
}

// 导航段定义
message Step {
  optional int32 id = 1;                          // 导航段Id
  optional int32 length = 2;                      // 导航段长度
  optional MainAction main_action = 3;            // 基本导航动作
  optional AssistantAction assistant_action = 4;  // 辅助导航动作
  optional int32 link_num_all = 5;                // 该导航段中link总数
  optional int32 link_num_sended = 6;             // 该导航段已经发送link数量(含本次)，重叠link不重复计算
  repeated Link links = 7;                        // 导航段包含的Link
  repeated int32 reserves = 8;                    // 导航段预留变量
}

// link路段定义
message Link {
  optional int32 id = 1;              // 道路Id
  optional int32 length = 2;          // 道路长度
  optional RoadClass road_class = 3;  // 道路等级
  optional RoadType road_type = 4;    // 道路类型
  optional LinkType link_type = 5;    // Link类型
  optional string link_name = 6;      // 道路名称
  optional int32 speed_limit = 7;     // 道路限速
  optional int32 lane_num = 8;        // 车道数量,行驶方向的车道数量
  optional int32 is_two_way_road = 9;  // 是否是双向通行道路，0无效值，1是，2否
  optional MainAction main_action = 10;            // 基本导航动作
  optional AssistantAction assistant_action = 11;  // 辅助导航动作
  optional int32 has_multi_out = 12;  // 是否有岔路，0无效值，1是，2否
  optional int32 has_mix_fork = 13;   // 是否有混淆路口, 0无效值，1是，2否
  optional int32 has_traffic_light = 14;  // 是否有红绿灯，0无效值，1是，2否
  repeated Point2D gps_points = 15;  // GPS点链
  repeated CameraInfo camera_info = 16;  // 摄像头信息,距离填相对link起点的距离
  repeated int32 reserves = 17;  // link预留变量
}

// ============================================================================
// 公共枚举和数据类型
// ============================================================================

// 基本导航动作
enum MainAction {
  MAIN_ACTION_NULL = 0;             // 无基本导航动作
  MAIN_ACTION_TURN_LEFT = 1;        // 左转
  MAIN_ACTION_TURN_RIGHT = 2;       // 右转
  MAIN_ACTION_SLIGHT_LEFT = 3;      // 向左前方行驶
  MAIN_ACTION_SLIGHT_RIGHT = 4;     // 向右前方行驶
  MAIN_ACTION_TURN_HARD_LEFT = 5;   // 向左后方行驶
  MAIN_ACTION_TURN_HARD_RIGHT = 6;  // 向右后方行驶
  MAIN_ACTION_UTURN = 7;            // 左转调头
  MAIN_ACTION_CONTINUE = 8;         // 直行
  MAIN_ACTION_MERGE_LEFT = 9;       // 靠左
  MAIN_ACTION_MERGE_RIGHT = 10;     // 靠右
  MAIN_ACTION_ENTRY_RING = 11;      // 进入环岛
  MAIN_ACTION_LEAVE_RING = 12;      // 离开环岛
  MAIN_ACTION_SLOW = 13;            // 减速行驶
  MAIN_ACTION_PLUG_CONTINUE = 14;   // 插入直行（泛亚特有）
  MAIN_ACTION_ENTER_BUILDING = 65;  // 进入建筑物
  MAIN_ACTION_LEAVE_BUILDING = 66;  // 离开建筑物
  MAIN_ACTION_BY_ELEVATOR = 67;     // 电梯换层
  MAIN_ACTION_BY_STAIR = 68;        // 楼梯换层
  MAIN_ACTION_BY_ESCALATOR = 69;    // 扶梯换层
  MAIN_ACTION_COUNT = 70;  // 导航主动作最大个数 无特殊意义
}

// 辅助导航动作
enum AssistantAction {
  ASSI_ACTION_NULL = 0;                      // 无辅助导航动作
  ASSI_ACTION_ENTRY_MAIN = 1;                // 进入主路
  ASSI_ACTION_ENTRY_SIDE_ROAD = 2;           // 进入辅路
  ASSI_ACTION_ENTRY_FREEWAY = 3;             // 进入高速
  ASSI_ACTION_ENTRY_SLIP = 4;                // 进入匝道
  ASSI_ACTION_ENTRY_TUNNEL = 5;              // 进入隧道
  ASSI_ACTION_ENTRY_CENTER_BRANCH = 6;       // 进入中间岔道
  ASSI_ACTION_ENTRY_RIGHT_BRANCH = 7;        // 进入右岔路
  ASSI_ACTION_ENTRY_LEFT_BRANCH = 8;         // 进入左岔路
  ASSI_ACTION_ENTRY_RIGHT_ROAD = 9;          // 进入右转专用道
  ASSI_ACTION_ENTRY_LEFT_ROAD = 10;          // 进入左转专用道
  ASSI_ACTION_ENTRY_MERGE_CENTER = 11;       // 进入中间道路
  ASSI_ACTION_ENTRY_MERGE_RIGHT = 12;        // 进入右侧道路
  ASSI_ACTION_ENTRY_MERGE_LEFT = 13;         // 进入左侧道路
  ASSI_ACTION_ENTRY_MERGE_RIGHT_Sild = 14;   // 靠右行驶进入辅路
  ASSI_ACTION_ENTRY_MERGE_LEFT_Sild = 15;    // 靠左行驶进入辅路
  ASSI_ACTION_ENTRY_MERGE_RIGHT_MAIN = 16;   // 靠右行驶进入主路
  ASSI_ACTION_ENTRY_MERGE_LEFT_MAIN = 17;    // 靠左行驶进入主路
  ASSI_ACTION_ENTRY_MERGE_RIGHT_RIGHT = 18;  // 靠右行驶进入右转专用道
  ASSI_ACTION_ENTRY_FERRY = 19;              // 到达航道
  ASSI_ACTION_LEFT_FERRY = 20;               // 驶离轮渡
  ASSI_ACTION_ALONG_ROAD = 23;               // 沿当前道路行驶
  ASSI_ACTION_ALONG_SILD = 24;               // 沿辅路行驶
  ASSI_ACTION_ALONG_MAIN = 25;               // 沿主路行驶
  ASSI_ACTION_ARRIVE_EXIT = 32;              // 到达出口
  ASSI_ACTION_ARRIVE_SERVICE_AREA = 33;      // 到达服务区
  ASSI_ACTION_ARRIVE_TOLL_GATE = 34;         // 到达收费站
  ASSI_ACTION_ARRIVE_WAY = 35;               // 到达途经地
  ASSI_ACTION_ARRIVE_DESTINATION = 36;       // 到达目的地的
