  ASSI_ACTION_RIGHT_BRANCH_1 = 64;  // 到达复杂路口，走右边第一出口
  ASSI_ACTION_RIGHT_BRANCH_2 = 65;  // 到达复杂路口，走右边第二出口
  ASSI_ACTION_RIGHT_BRANCH_3 = 66;  // 到达复杂路口，走右边第三出口
