syntax = "proto2";

package deeproute.canbus;

import "common/configs/vehicle_config.proto";
import "canbus/gwm_chassis_detail.proto";
import "canbus/hy11_chassis_detail.proto";
import "canbus/lp_v35_chassis_detail.proto";
import "canbus/lp_v35x_chassis_detail.proto";

// topic: /dtu/dtu_hmi_to_canbus_request
message DtuHmiToCanbusRequest {
  optional sfixed64 time_meas = 1;
  optional string id = 2;

  optional HmiChassisDetails hmi_chassis_detail = 100;
}

message HmiChassisDetails {
  optional deeproute.common.VehicleBrand brand = 1;
  oneof detail {
    GwmHmi gwm = 6;
    Hy11Hmi hy11 = 8;
    LpV35Hmi lp_v35 = 10;
    LpV35xHmi lp_v35x = 11;
  }
  reserved 7;
}




message GwmHmi {
  optional HAP_FD1_15B hap_fd1_15b = 1;
  optional HAP_FD2_274 hap_fd2_274 = 2;
  optional HAP_FD6_289 hap_fd6_289 = 3;
  optional HAP_FD3_298 hap_fd3_298 = 4;
  optional HAP_FD7_29B hap_fd7_29b = 5;

  optional ACC_FD1_143 acc_fd1_143 = 6;
  optional ACC_FD2_2AB acc_fd2_2ab = 7;
  optional ACC_FD3_2B4 acc_fd3_2b4 = 8;
  optional ACC_FD4_2B8 acc_fd4_2b8 = 9;

  optional IFC_FD1_12B ifc_fd1_12b = 10;
  optional IFC_FD5_19F ifc_fd5_19f = 11;
  optional IFC_FD6_222 ifc_fd6_222 = 12;
  optional IFC_FD2_23D ifc_fd2_23d = 13;
  optional IFC_FD4_240 ifc_fd4_240 = 14;
  optional IFC_FD7_2A2 ifc_fd7_2a2 = 15;
  optional IFC_FD3_2CF ifc_fd3_2cf = 16;

  optional AEB_FD1_18B aeb_fd1_18b = 17;
  optional AEB_FD2_227 aeb_fd2_227 = 18;

  optional MDC_FD1_312 mdc_fd1_312 = 19;
  optional CR_FD1_15E cr_fd1_15e = 20;
  optional ADAS_AD1_470 adas_ad1_470 = 21;
  optional RSDS_FD1_16F rsds_fd1_16f = 22;
  optional RSDS_FD2_30A rsds_fd2_30a = 23;
  optional IFC_FD10_266 ifc_fd10_266 = 24;
}


message Hy11Hmi {
  optional HomePrkgSysSts veh_home_prkg_sys_sts_home_prkg_sys_sts = 1;
}

message LpV35Hmi {
  optional deeproute.canbus.lp.v35.ADDC_23_E_23E addc_23_e_23e = 1;
  optional deeproute.canbus.lp.v35.ADDC_23_F_23F addc_23_f_23f = 2;
  optional deeproute.canbus.lp.v35.ADDC_83_83 addc_83_83 = 3;
  optional deeproute.canbus.lp.v35.ADDC_84_84 addc_84_84 = 4;
  optional deeproute.canbus.lp.v35.ADDC_23_A_23A addc_23_a_23a = 5;
  optional deeproute.canbus.lp.v35.ADDC_23_B_23B addc_23_b_23b = 6;
  optional deeproute.canbus.lp.v35.ADDC_23_C_23C addc_23_c_23c = 7;
  optional deeproute.canbus.lp.v35.ADDCSOC_2_F5_2F5 addcsoc_2_f5_2f5 = 8;
  optional deeproute.canbus.lp.v35.ADDCSOC_2_F6_2F6 addcsoc_2_f6_2f6 = 9;
}

message LpV35xHmi {
  optional deeproute.canbus.lp.v35x.ADDC_23_E_23E addc_23_e_23e = 1;
  optional deeproute.canbus.lp.v35x.ADDC_23_F_23F addc_23_f_23f = 2;
  optional deeproute.canbus.lp.v35x.ADDC_83_83 addc_83_83 = 3;
  optional deeproute.canbus.lp.v35x.ADDC_84_84 addc_84_84 = 4;
  optional deeproute.canbus.lp.v35x.ADDC_23_A_23A addc_23_a_23a = 5;
  optional deeproute.canbus.lp.v35x.ADDC_23_B_23B addc_23_b_23b = 6;
  optional deeproute.canbus.lp.v35x.ADDC_23_C_23C addc_23_c_23c = 7;
  optional deeproute.canbus.lp.v35x.ADDCSOC_2_F5_2F5 addcsoc_2_f5_2f5 = 8;
  optional deeproute.canbus.lp.v35x.ADDCSOC_2_F6_2F6 addcsoc_2_f6_2f6 = 9;
}
