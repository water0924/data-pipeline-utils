//topic: /leap/hmi/parking_motion  100ms   struct
message ParkingMotion {
  lp.basiccommon.Header header = 1;                                 // 帧头，包含时间戳、序列号、模块名
  bool apa_interface = 2;                                           // 0:无请求 1：请求
  uint32 apa_offset_enable = 3;                                     // 是否满足智慧偏移条件     0：只满足居中  1：左中满足  2：右中满足  3：左中右都满足
  float path_length = 4;                                            // 剩余轨迹长度，单位 m
  ParkingModeEnum parking_mode = 5;                                 // 泊车模式：
  ParkingFuncEnum func_default = 6;                                 // 默认泊车功能，0：泊入，1：泊出
  lp.common.FuncModeEnum func_mode = 7;                             // APA、RPA功能控制模式
  uint32 textinfo_index = 8;                                        //* 交互文本索引，具体取值对应HMI显示交互                                                        
  uint32 custom_info = 9;
  uint32 custom_prompt = 10;
  uint32 custom_process = 11;                                       // 0:默认 1：成功 2：失败 3.处理中 
  bool safety_valid = 12;                                           // 碰撞风险有效性 ，取值如下：0: 无效 1：有效
  uint32 left_safety_level = 13;                                    // 左侧碰撞等级，取值如下 0：无碰撞风险 1：碰撞等级等级0 2：碰撞等级1 3：碰撞等级2 4：碰撞等级3
  uint32 right_safety_level = 14;                                   // 右侧碰撞等级，取值如下 0：无碰撞风险 1：碰撞等级等级0 2：碰撞等级1 3：碰撞等级2 4：碰撞等级3
  uint32 front_safety_level = 15;                                   // 前侧碰撞等级，取值如下 0：无碰撞风险 1：碰撞等级等级0 2：碰撞等级1 3：碰撞等级2 4：碰撞等级3
  uint32 rear_safety_level = 16;                                    // 后侧碰撞等级，取值如下 0：无碰撞风险 1：碰撞等级等级0 2：碰撞等级1 3：碰撞等级2 4：碰撞等级3
  lp.common.FuncModeEnum clarion_call_func_mode = 17;               // 直线召唤(RSPA)功能控制模式
  uint32 clarion_call_not_available_reason = 18;
  uint32 clarion_call_suspend_reason = 19;                          /* 0：无请求 1：已达到最大行驶距离5m 2：检测到障碍物 3：蓝牙收发异常*/
  uint32 clarion_call_quit_reason = 20;
  uint32 clarion_reserved = 21;                                     // 预留
  lp.basiccommon.SlotSideEnum rpa_parking_out_direction = 22;       // 自动泊出方向，0：无， 1：左，2：右，3：前，4：后
  lp.basiccommon.SlotTypeEnum rpa_parking_type = 23;                // 泊车类型，0：无，1：垂直，2：水平，3：斜车位，4：机械车位，5：自定义车位，6：常用车位
  uint32 continue_parking = 24;                                     // 是否满足继续泊车条件    0:默认 1：满足 2：不满足
  lp.common.FuncModeEnum ra_func_mode = 25;                         // 寻迹倒车(RADS)功能控制模式
  uint32 ra_textinfo_index = 26;
  lp.basiccommon.LatencyStatus latency_status = 27;                 // 统计耗时，具体在common中定义
  lp.basiccommon.ModuleStatus module_status = 28;                   // 统计错误状态、错误代码、错误原因等，具体在common模块的leap.basiccommon.proto.ModuleStatus定义               
}
