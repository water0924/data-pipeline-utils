syntax = "proto2";

import "vla/vla_output.proto";

package deeproute.cloud_cfgs;

message FunctionsConfig {
  // GWM prefix
  optional string config_id = 4;
  optional string update_time = 5;
  optional string version = 6;

  // functions mode/gear
  optional ActiveSafetyCloudConfig active_safety = 1;
  optional ParkingCloudConfig parking = 2;
  optional CalibrationCloudConfig calibration = 3;
  optional DrivingCloudConfig driving = 7;
  optional UltrasonicCloudConfig ultrasonic = 8;
  optional ChurchCloudConfig church = 9; // Church component cloud config
}

enum ActiveSafetyGear {
  ActiveSafety_OFF = 0;        // close this function
  ActiveSafety_LOW = 1;        // low level
  ActiveSafety_MIDDLE = 2;     // middle level
  ActiveSafety_HIGH = 3;       // high level
  ActiveSafety_DEFAULT = 4;    // default level for CNCAP testing
  ActiveSafety_CUSTOM = 5;     // custom level
  ActiveSafety_NOA_SAFETY = 6; // noa safety level
  ActiveSafety_MODEL = 7;      // model level
}

enum ActiveFieldMode {
  ActiveFieldMode_DEFAULT = 1;
  ActiveFieldMode_INSIDE = 2;
  ActiveFieldMode_OUTSIDE = 3;
}

enum ActiveSnowMode {
  ActiveSnowMode_OFF = 0;
  ActiveSnowMode_ON = 1;
  ActiveSnowMode_AUTO = 2;
}

message ActiveSafetyCloudConfig {
  optional ActiveSafetyGear aeb_gear = 1 [ default = ActiveSafety_MIDDLE ];
  optional ActiveSafetyGear front_meb_gear = 2
      [ default = ActiveSafety_MIDDLE ];
  optional ActiveSafetyGear rear_meb_gear = 3 [ default = ActiveSafety_MIDDLE ];
  optional ActiveSafetyGear rctb_gear = 4 [ default = ActiveSafety_MIDDLE ];
  optional ActiveSafetyCloudConfigDetail active_safety_cloud_config_detail = 5;
  optional MAICloudConfig mai_cloud_config = 6;
  optional ActiveFieldMode field_mode = 7 [ default = ActiveFieldMode_DEFAULT ];
  optional ActiveSafetyGear raeb_gear = 8 [ default = ActiveSafety_MIDDLE ];
  optional RAEBCloudConfig raeb_cloud_config = 9;
  optional ActiveSnowMode snow_mode = 10 [ default = ActiveSnowMode_OFF ];
  optional ActiveSafetyESACloudConfigDetail active_safety_esa_cloud_config_detail = 11;
}

message ActiveSafetyCloudConfigDetail {
  // 是否启用详细配置
  optional bool enable = 1 [ default = false ];
  // c2c最大刹停速度
  optional double vehicle_max_speed_decrease = 2 [ default = 150.0 ];
  // truck最大刹停速度
  optional double truck_max_speed_decrease = 3 [ default = 150.0 ];
  // vru最大刹停速度
  optional double pedestrian_max_speed_decrease = 4 [ default = 150.0 ];
  optional double bicycle_max_speed_decrease = 5 [ default = 150.0 ];
  // 锥桶,水马,三脚架最大刹停速度
  optional double traffic_cone_max_speed_decrease = 6 [ default = 150.0 ];
  // 一般静态障碍物最大刹停速度
  optional double unmovable_unknown_max_speed_decrease = 7 [ default = 150.0 ];
  // 其余障碍物最大刹停速度
  optional double default_obj_max_speed_decrease = 8 [ default = 150.0 ];
  // 启用物体模型预测轨迹
  optional bool enable_obj_model_based_trajectory = 9 [ default = false ];
  // 启用物体转向轨迹
  optional bool enable_obj_steer_trajectory = 10 [ default = true ];
  // 启用自车模型预测轨迹
  optional bool enable_adc_model_based_prediction = 11 [ default = false ];
  // 启用削减车宽
  optional bool enable_reduce_adc_width = 12 [ default = false ];
  // 削减车宽比例
  optional double reduce_adc_width_ratio = 13 [ default = 0.12 ];
  // 削减车宽最高速度
  optional double reduce_adc_width_max_speed = 14 [ default = 30 ];
  // 启用tracking time 检查
  optional bool enable_tracking_time_check = 15 [ default = false ];
  // tracking time 最低自车速度
  optional double min_tracking_time_adc_speed = 16 [ default = 60.0 ];
  // tracking time 最低跟车时间
  optional double min_tracking_time = 17 [ default = 1.5 ];
  // tracking time 最大减速度
  optional double max_tracking_time_decel = 18 [ default = -5.0 ];
  // 启用大曲率弯道检查
  optional bool enable_large_curvature_check = 19 [ default = false ];
  // 大曲率弯道半径限制
  optional double min_curvature_radius = 20 [ default = 50.0 ];
  // 关闭行人高度过滤
  optional bool disable_low_pedestrian = 21 [ default = false ];
  // 启用低相对速度跟车逻辑
  optional bool enable_slow_car_following_obj = 22 [ default = true ];
  // 启用cut in 策略
  optional bool enable_cut_in_obj_dtc = 23 [ default = true ];
  // 20kph 以下自车刹停距离调整
  optional bool disable_dists_stop_change_lower20kph = 24 [ default = false ];
  // 最小锥桶数量
  optional int64 min_single_cone_num = 25 [ default = 2 ];
  // 80kph以上锥桶忽略
  optional bool ignore_cone_upper80kph = 26 [ default = false ];
  // 启用绕行策略
  optional bool enable_nudge_prediction = 27 [ default = true ];
  // 启用一般障碍物
  optional bool enable_unknown_unmovable = 28 [ default = true ];
  // aeb 刹停距离
  optional double dist_stop_0kph = 29 [ default = 0.0 ];
  optional double dist_stop_10kph = 30 [ default = 0.5 ];
  optional double dist_stop_20kph = 31 [ default = 0.7 ];
  optional double dist_stop_80kph = 32 [ default = 0.7 ];
  optional double dist_stop_120kph = 33 [ default = 1.0 ];
  optional double dist_stop_150kph = 34 [ default = 1.0 ];
  // 启用部分刹车
  optional bool enable_partial_brake = 35 [ default = false ];
  // 启用自车高速目标穿行混合计算逻辑
  optional bool enable_high_speed_c2c_crossing_hybrid = 36 [ default = false ];
  // 恢复自车低速目标蠕形逻辑
  optional bool revert_low_speed_adc_obj_low_speed = 37 [ default = false ];
  // 启用变道cut in 逻辑
  optional bool enable_cut_in_calc_by_lc = 38 [ default = false ];
  // 恢复低相对速度跟车逻辑
  optional bool revert_close_dist_car_following = 39 [ default = false ];
  // 启用自车减速抑制逻辑
  optional bool use_adc_speed_down_inhibit = 40 [ default = false ];
  // 自车减速抑制逻辑速度阈值
  optional double adc_speed_down_inhibit_thres = 41 [ default = 90.0 ];
  // 启用自车绕行轨迹优化
  optional bool revert_adc_nudge_trajectory_optimization = 42
      [ default = false ];
  // 启用junction场景考虑大曲率抑制
  optional bool enable_junction_large_curvature = 43 [ default = true ];
  // 是否对车辆等非VRU物体启用traj_line_near_adc过滤
  optional bool enable_traj_near_adc_for_car = 44 [ default = false ];
  // 是否对快刹停的直行车辆过滤匀速外推轨迹
  optional bool enable_traj_filter_for_low_spd_decel_vehicle = 45
      [ default = true ];
  // 云端增删场地坐标,注入码为加密后的位置信息，index为需要删除的场地序号
  repeated string injection_code = 46;
  repeated int32 unused_index = 47;
  // 是否过滤UNKNOWN子类别的卡车,过滤则置为true
  optional bool enable_truck_unknown_subtype_ignore = 48 [ default = false ];
  // VRU的tracking time阈值
  optional double highway_tracking_check_time = 49 [ default = 2.0 ];
  // VRU的tracking time检查的车速阈值
  optional double vru_tracking_adc_speed = 50 [ default = 0.0 ];
  // 是否在高速场景下启用vru的trackingtime检查
  optional bool enable_vru_highway_tracking_check = 51 [ default = false ];
  // 选择影子事件上报抑制
  repeated string inhibit_shadow_reasons = 52;
  // 是否用radar校验低速二轮车
  optional bool check_low_speed_bicycle_by_radar = 53 [ default = true ];
  // 是否用radar校验低速小车
  optional bool check_low_speed_vehicle_by_radar = 54 [ default = true ];
  // 各类物体的配置参数
  optional ObjectConfig vehicle = 55;
  optional ObjectConfig truck = 56;
  optional ObjectConfig pedestrian = 57;
  optional ObjectConfig bicycle = 58;
  optional ObjectConfig traffic_cone = 59;
  // 云端增加主动安全抑制场地，抑制码为加密后的位置信息
  repeated string inhibit_code = 60;
  optional bool enable_model_decision_override_aeb_decision = 61;
}

message SpeedTable1D {
  repeated double speed = 1;
  repeated double value = 2;
}

message ObjectConfig { repeated SpeedTable1D tracking_time_table = 1; }

message MAICloudConfig {
  optional double window_duration = 1;
  optional double high_pedal_duration_repeat = 2;
  optional double pedal_rate = 3;
  optional double high_pedal_threshold = 4;
  optional double high_pedal_duration = 5;
}

message RAEBCloudConfig { optional double inhibit_speed_lower_threshold = 1; }

enum ParkingMode {
  PARKING_OFF = 0;          // close this function
  PARKING_AGGRESIVE = 1;    // aggresive level
  PARKING_STANDARD = 2;     // standard level
  PARKING_CONSERVATIVE = 3; // conservative level
  PARKING_DEMO = 4;         // 不开放给任何用户，仅用于内部测试
}

message APACloudConfig {
  optional ParkingMode safety_mode = 1 [ default = PARKING_STANDARD ];
  optional ParkingMode speed_mode = 2 [ default = PARKING_STANDARD ];
  optional bool enable_outparking_takeover_warning = 3 [ default = false ];
  optional bool allow_rear_wheel_steering_parking = 4 [ default = false ];
  optional bool enable_use_manually_parkin_info = 5 [ default = true ];
  optional bool enable_single_border_mirror_fold = 6 [ default = true ];
}

message HAVPCloudConfig {
  optional ParkingMode driving_style = 1 [ default = PARKING_STANDARD ];
  optional bool active_notification = 2 [ default = true ];
  optional bool barrier_gate_access = 3 [ default = false ];
  optional bool enable_outdoor_parking_lot_routing = 4 [ default = true ];
  optional bool enable_expand_map = 5 [ default = false ];
  optional bool enable_detour = 6 [ default = false ];
  optional bool enable_reverse_slope_search = 7 [ default = true ];
  optional bool enable_vin_user = 8 [ default = false ];
  optional bool zero_gnss_pose_height = 9 [ default = false ];
}

message RADSCloudConfig {
  optional ParkingMode safety_mode = 1 [ default = PARKING_STANDARD ];
}

message RPACloudConfig {
  optional bool enable_leave_car_parking = 1 [ default = false ];
}

message ParkingCloudConfig {
  optional APACloudConfig apa_cloud_config = 1;
  optional HAVPCloudConfig havp_cloud_config = 2;
  optional RADSCloudConfig rads_cloud_config = 3;
  optional RPACloudConfig rpa_cloud_config = 4;
}

message CalibMonitorCloudConfig {
  optional bool update_local_file = 1 [ deprecated = true ];
  optional bool avm_update_local_file = 2;
  optional bool svm_update_local_file = 3;
  optional bool lidar_update_local_file = 4;
  optional bool ins_update_local_file = 5;
}

message CalibrationCloudConfig {
  optional CalibMonitorCloudConfig calib_monitor_config = 1;
}

message DrivingCloudConfig {
  optional bool exam_mode = 1;
  optional bool enable_waiting_area = 2 [ default = false ];
  optional bool driving_poa = 3 [ default = true ];
  optional bool enable_buslane_hmi_switch = 4 [
    default = true
  ]; //分时公交车道文言使能开关，默认为true，2025/8/XX C01T首发新加@ao chen
  optional bool enable_hwconspdlmt_switch = 5 [
    default = false
  ]; //高速施工限速使能开关，默认为false，2025/8/XX C01T首发新加@siqin lin
  optional bool enable_hwconspdlmtper_switch = 6 [
    default = true
  ]; //基于感知的高速施工限速使能开关，默认为true，2025/8/29 @siqin lin
  optional bool enable_construction_passable_switch = 7
      [ default =
            true ]; //施工passable模型使能开关，默认true, 2025/11/3 @ao chen
  optional bool enable_highway_passable_switch = 8
      [ default =
            true ]; //高速全开passable模型使能开关，默认true, 2025/11/3 @ao chen

  // vla 分场景开关，默认true, 2025/12/1 @haoyu li
  optional bool enable_vla_speed_limit_switch = 9
      [ default = true ]; //启用vla限速使能开关，默认true, 2025/12/1 @haoyu li
  repeated deeproute.vla.vla_output.VlaOutput.RiskScenario enable_vla_scenes =
      10; //启用vla场景开关
  optional bool enable_highway_merge_stop_switch = 11
      [ default =
            true ]; //高速全开汇入刹停使能开关，默认true, 2025/11/26 @ao chen
  optional bool enable_follow_car_defensive_switch = 12 [
    default = true
  ]; //前车急减速防御性驾驶使能开关，默认true, 2025/11/26 @ao chen

  optional bool demo_sys_info_switch = 13 [ default = false ]; //Demo时对退功能提示的显示开关
  optional bool demo_downgrade_info_switch = 14 [ default = false ]; //Demo时对降级提示的显示开关
  optional bool demo_horizontal_override_info_switch = 15 [ default = false ]; //Demo时对横向接管提示的显示开关
  optional bool demo_longitudinal_override_info_switch = 16 [ default = false ]; //Demo时对纵向接管提示的显示开关
  optional bool demo_active_info_switch = 17 [ default = false ]; //Demo时对激活功能提示的显示开关

  optional bool enable_variable_lane_guidance_switch = 18 [
    default = false
  ];                // 可变车道引导云端开关，默认false 2026/01/21 @peiyao ke
  optional bool hazy_mode_info_switch = 20 [ default = true ];  // 雾天模式云端开关
  optional bool enable_single_lane_defensive = 21 [ default = true ];  //限速异常场景单车道防御性降速开关@Tingzhuang Liu
  optional bool nca_mrm_pullover = 22 [ default = true ];  //nca高快靠边停车开关@haitao huang
}

enum UltrasonicMode {
  ULTRASONIC_ONLY_MODE_1 = 0;       // only uss 1.0
  ULTRASONIC_MODE_1_AND_MODE_3 = 1; // uss 1.0 + uss 3.0
  ULTRASONIC_ONLY_MODE_3 = 2;       // only uss 3.0
  ULTRASONIC_UNKNOWN = 3;           // default mode
}

message UltrasonicCloudConfig { optional UltrasonicMode uss_mode = 1; }

// Church component cloud configuration
message ComponentParam {
  optional string key = 1;   // Parameter key, e.g., "/config/perception_mode"
  optional string value = 2; // Parameter value, e.g., "l2avp_querytracker"
}

message ComponentCloudConfig {
  optional string component_name = 1; // Component name, e.g., "Perception"
  optional string graph_config_path =
      2; // Graph config path (relative or absolute)
  repeated ComponentParam params = 3; // Custom parameters for the component
}

message ChurchCloudConfig {
  repeated ComponentCloudConfig components =
      1; // List of component configurations
}

message ActiveSafetyESACloudConfigDetail{
  // 是否启用详细配置
  optional bool enable = 1 [ default = false ];
  // 前、后方轨迹检查时间
  optional SpeedTable1D traj_collision_init_frame = 2;
  // 前方目标检测范围
  optional double clearance_normal_forward_t = 3 [default = 1.5];
  // 后方纵向检测范围
  optional SpeedTable1D clearance_rear_obj_speed_to_s_threshold = 4;
  // 边刹边让的减速度
  optional double const_acceleration = 5 [default = -3.0];
  // 边刹边让的jerk
  optional double const_jerk_abs = 6 [default = 3.0];
}
